name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard marketing homepage
        run: |
          set -euo pipefail

          if grep -qE 'zhuangxiu_app|flutter_bootstrap\.js' server/public/index.html; then
            echo "server/public/index.html points to the Flutter app entrypoint, not the marketing website."
            exit 1
          fi

          if ! grep -q '粤ICP备2025480867号-2' server/public/index.html; then
            echo "server/public/index.html is missing the required ICP footer."
            exit 1
          fi

      - name: Upload checkout over SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          set -euo pipefail

          ssh_port="${SSH_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh_opts=(
            -i ~/.ssh/deploy_key
            -p "$ssh_port"
            -o StrictHostKeyChecking=accept-new
            -o ServerAliveInterval=15
          )

          remote="${SSH_USER}@${SSH_HOST}"
          staging_dir="${APP_DIR}.deploy-tmp"

          ssh "${ssh_opts[@]}" "$remote" "rm -rf '$staging_dir' && mkdir -p '$staging_dir'"
          tar --exclude='.git' -czf - . | ssh "${ssh_opts[@]}" "$remote" "tar -xzf - -C '$staging_dir'"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: APP_DIR
          script: |
            set -euo pipefail

            if ! command -v node >/dev/null 2>&1; then
              echo "Node.js is required on the server"
              exit 1
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            staging_dir="${APP_DIR}.deploy-tmp"
            backup_dir="${APP_DIR}.backup.$(date +%Y%m%d_%H%M%S)"

            if [ ! -d "$staging_dir" ]; then
              echo "Missing uploaded staging directory: $staging_dir"
              exit 1
            fi

            if [ -d "$APP_DIR" ]; then
              mkdir -p "$staging_dir/server"
              if [ -f "$APP_DIR/server/.env" ]; then
                cp -p "$APP_DIR/server/.env" "$staging_dir/server/.env"
              fi
              if [ -d "$APP_DIR/server/uploads" ]; then
                rm -rf "$staging_dir/server/uploads"
                cp -a "$APP_DIR/server/uploads" "$staging_dir/server/uploads"
              fi
              if [ -d "$APP_DIR/server/logs" ]; then
                rm -rf "$staging_dir/server/logs"
                cp -a "$APP_DIR/server/logs" "$staging_dir/server/logs"
              fi
              if [ -d "$APP_DIR/server/storage" ]; then
                rm -rf "$staging_dir/server/storage"
                cp -a "$APP_DIR/server/storage" "$staging_dir/server/storage"
              fi

              mv "$APP_DIR" "$backup_dir"
              mv "$staging_dir" "$APP_DIR"
              mkdir -p "$(dirname "$APP_DIR")"
              echo "Activated uploaded checkout. Backup: $backup_dir"
            else
              mkdir -p "$(dirname "$APP_DIR")"
              mv "$staging_dir" "$APP_DIR"
              echo "Activated uploaded checkout."
            fi

            cd "$APP_DIR"

            cd server
            npm ci --omit=dev
            mkdir -p uploads logs

            if [ ! -f .env ]; then
              echo "Missing server/.env on deployment host. Create it from server/.env.example before deploying."
              exit 1
            fi

            set -a
            . ./.env
            set +a

            node scripts/run-migration.js migrations/20260628_owner_member_role.sql
            node scripts/run-migration.js migrations/20260628_project_event_notifications.sql
            node scripts/run-migration.js migrations/20260628_project_lifecycle_status.sql
            node scripts/run-migration.js migrations/20260629_business_catalog_companies.sql
            node scripts/run-migration.js migrations/20260629_professionals.sql
            node scripts/run-migration.js migrations/20260629_company_members.sql
            node scripts/run-migration.js migrations/20260629_consultation_targets.sql
            node scripts/run-migration.js migrations/20260629_project_participants_ext.sql
            node scripts/run-migration.js migrations/20260629_entity_relations.sql

            pm2 startOrReload ecosystem.config.cjs --env production --update-env
            pm2 save

            if command -v nginx >/dev/null 2>&1; then
              nginx_placeholder_conf="$(grep -Rsl 'frontend not deployed' /etc/nginx /usr/local/nginx/conf 2>/dev/null | grep -v '\.bak\.' | head -n 1 || true)"
              if [ -n "$nginx_placeholder_conf" ] && [ -f "$nginx_placeholder_conf" ]; then
                nginx_runner=""
                if [ "$(id -u)" -eq 0 ]; then
                  nginx_runner=""
                elif command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
                  nginx_runner="sudo"
                else
                  echo "Skipping nginx root patch: deployment user cannot write nginx config and has no passwordless sudo."
                fi

                if [ "$(id -u)" -eq 0 ] || [ -n "$nginx_runner" ]; then
                  nginx_tmp="$(mktemp)"
                  if cp "$nginx_placeholder_conf" "$nginx_tmp"; then
                    node scripts/patch-nginx-root.js "$nginx_tmp"
                    if ! cmp -s "$nginx_placeholder_conf" "$nginx_tmp"; then
                      nginx_backup="${nginx_placeholder_conf}.bak.$(date +%Y%m%d_%H%M%S)"
                      $nginx_runner cp -p "$nginx_placeholder_conf" "$nginx_backup"
                      $nginx_runner cp "$nginx_tmp" "$nginx_placeholder_conf"
                      if $nginx_runner nginx -t; then
                        nginx_reloaded="false"
                        if command -v systemctl >/dev/null 2>&1 && $nginx_runner systemctl reload nginx; then
                          nginx_reloaded="true"
                        fi
                        if [ "$nginx_reloaded" != "true" ] && $nginx_runner nginx -s reload; then
                          nginx_reloaded="true"
                        fi
                        if [ "$nginx_reloaded" != "true" ] && command -v pkill >/dev/null 2>&1 && $nginx_runner pkill -HUP nginx; then
                          nginx_reloaded="true"
                        fi
                        if [ "$nginx_reloaded" != "true" ]; then
                          echo "nginx config was patched, but nginx could not be reloaded automatically."
                        fi
                      else
                        echo "nginx config test failed; restoring $nginx_backup"
                        $nginx_runner cp -p "$nginx_backup" "$nginx_placeholder_conf"
                        $nginx_runner nginx -t || true
                      fi
                    fi
                    rm -f "$nginx_tmp"
                  else
                    echo "Skipping nginx root patch: cannot read $nginx_placeholder_conf."
                  fi
                fi
              fi

              nginx_runner=""
              if [ "$(id -u)" -eq 0 ]; then
                nginx_runner=""
              elif command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
                nginx_runner="sudo"
              fi

              if [ "$(id -u)" -eq 0 ] || [ -n "$nginx_runner" ]; then
                if $nginx_runner nginx -t; then
                  if command -v systemctl >/dev/null 2>&1 && $nginx_runner systemctl reload nginx; then
                    echo "nginx reloaded with systemctl."
                  elif $nginx_runner nginx -s reload; then
                    echo "nginx reloaded with nginx -s reload."
                  else
                    echo "nginx reload command failed; continuing deployment."
                  fi
                else
                  echo "nginx config test failed; skipping reload."
                fi
              else
                echo "Skipping nginx reload: deployment user has no root or passwordless sudo."
              fi
            fi

            for attempt in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:${PORT:-3001}/health"; then
                exit 0
              fi
              echo "Waiting for backend health check... ($attempt/30)"
              sleep 2
            done

            echo "Backend health check failed after waiting."
            exit 1
