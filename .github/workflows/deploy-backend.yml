name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
          APP_BRANCH: main
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: APP_DIR,REPO_URL,APP_BRANCH
          script: |
            set -euo pipefail

            if ! command -v git >/dev/null 2>&1; then
              echo "git is required on the server"
              exit 1
            fi

            if ! command -v node >/dev/null 2>&1; then
              echo "Node.js is required on the server"
              exit 1
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            if [ -d "$APP_DIR" ] && [ ! -d "$APP_DIR/.git" ]; then
              backup_dir="${APP_DIR}-legacy-$(date +%Y%m%d_%H%M%S)"
              staging_dir="${APP_DIR}.deploy-tmp"

              rm -rf "$staging_dir"
              git clone --branch "$APP_BRANCH" "$REPO_URL" "$staging_dir"

              mkdir -p "$staging_dir/server"
              if [ -f "$APP_DIR/server/.env" ]; then
                cp -p "$APP_DIR/server/.env" "$staging_dir/server/.env"
              fi
              if [ -d "$APP_DIR/server/uploads" ]; then
                rm -rf "$staging_dir/server/uploads"
                cp -a "$APP_DIR/server/uploads" "$staging_dir/server/uploads"
              fi
              if [ -d "$APP_DIR/server/logs" ]; then
                rm -rf "$staging_dir/server/logs"
                cp -a "$APP_DIR/server/logs" "$staging_dir/server/logs"
              fi

              mv "$APP_DIR" "$backup_dir"
              mv "$staging_dir" "$APP_DIR"
              echo "Migrated legacy deployment to git checkout. Backup: $backup_dir"
            elif [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$(dirname "$APP_DIR")"
              git clone --branch "$APP_BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin "$APP_BRANCH"
            git reset --hard "origin/$APP_BRANCH"

            cd server
            npm ci --omit=dev
            mkdir -p uploads logs

            if [ ! -f .env ]; then
              echo "Missing server/.env on deployment host. Create it from server/.env.example before deploying."
              exit 1
            fi

            set -a
            . ./.env
            set +a

            node scripts/run-migration.js migrations/20260628_project_event_notifications.sql

            pm2 startOrReload ecosystem.config.cjs --env production --update-env
            pm2 save

            if command -v nginx >/dev/null 2>&1; then
              nginx_placeholder_conf="$(grep -Rsl 'frontend not deployed' /etc/nginx /usr/local/nginx/conf 2>/dev/null | head -n 1 || true)"
              if [ -n "$nginx_placeholder_conf" ] && [ -f "$nginx_placeholder_conf" ]; then
                nginx_runner=""
                if [ "$(id -u)" -eq 0 ]; then
                  nginx_runner=""
                elif command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
                  nginx_runner="sudo"
                else
                  echo "Skipping nginx root patch: deployment user cannot write nginx config and has no passwordless sudo."
                fi

                if [ "$(id -u)" -eq 0 ] || [ -n "$nginx_runner" ]; then
                  nginx_tmp="$(mktemp)"
                  if cp "$nginx_placeholder_conf" "$nginx_tmp"; then
                    node scripts/patch-nginx-root.js "$nginx_tmp"
                    if ! cmp -s "$nginx_placeholder_conf" "$nginx_tmp"; then
                      nginx_backup="${nginx_placeholder_conf}.bak.$(date +%Y%m%d_%H%M%S)"
                      $nginx_runner cp -p "$nginx_placeholder_conf" "$nginx_backup"
                      $nginx_runner cp "$nginx_tmp" "$nginx_placeholder_conf"
                      if $nginx_runner nginx -t; then
                        nginx_reloaded="false"
                        if command -v systemctl >/dev/null 2>&1 && $nginx_runner systemctl reload nginx; then
                          nginx_reloaded="true"
                        fi
                        if [ "$nginx_reloaded" != "true" ] && $nginx_runner nginx -s reload; then
                          nginx_reloaded="true"
                        fi
                        if [ "$nginx_reloaded" != "true" ] && command -v pkill >/dev/null 2>&1 && $nginx_runner pkill -HUP nginx; then
                          nginx_reloaded="true"
                        fi
                        if [ "$nginx_reloaded" != "true" ]; then
                          echo "nginx config was patched, but nginx could not be reloaded automatically."
                        fi
                      else
                        echo "nginx config test failed; restoring $nginx_backup"
                        $nginx_runner cp -p "$nginx_backup" "$nginx_placeholder_conf"
                        $nginx_runner nginx -t || true
                      fi
                    fi
                    rm -f "$nginx_tmp"
                  else
                    echo "Skipping nginx root patch: cannot read $nginx_placeholder_conf."
                  fi
                fi
              fi
            fi

            for attempt in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:${PORT:-3001}/health"; then
                exit 0
              fi
              echo "Waiting for backend health check... ($attempt/30)"
              sleep 2
            done

            echo "Backend health check failed after waiting."
            exit 1
