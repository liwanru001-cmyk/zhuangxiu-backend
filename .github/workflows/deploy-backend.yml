name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
          APP_BRANCH: main
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: APP_DIR,REPO_URL,APP_BRANCH
          script: |
            set -euo pipefail

            if ! command -v git >/dev/null 2>&1; then
              echo "git is required on the server"
              exit 1
            fi

            if ! command -v node >/dev/null 2>&1; then
              echo "Node.js is required on the server"
              exit 1
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            if [ -d "$APP_DIR" ] && [ ! -d "$APP_DIR/.git" ]; then
              backup_dir="${APP_DIR}-legacy-$(date +%Y%m%d_%H%M%S)"
              staging_dir="${APP_DIR}.deploy-tmp"

              rm -rf "$staging_dir"
              git clone --branch "$APP_BRANCH" "$REPO_URL" "$staging_dir"

              mkdir -p "$staging_dir/server"
              if [ -f "$APP_DIR/server/.env" ]; then
                cp -p "$APP_DIR/server/.env" "$staging_dir/server/.env"
              fi
              if [ -d "$APP_DIR/server/uploads" ]; then
                rm -rf "$staging_dir/server/uploads"
                cp -a "$APP_DIR/server/uploads" "$staging_dir/server/uploads"
              fi
              if [ -d "$APP_DIR/server/logs" ]; then
                rm -rf "$staging_dir/server/logs"
                cp -a "$APP_DIR/server/logs" "$staging_dir/server/logs"
              fi

              mv "$APP_DIR" "$backup_dir"
              mv "$staging_dir" "$APP_DIR"
              echo "Migrated legacy deployment to git checkout. Backup: $backup_dir"
            elif [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$(dirname "$APP_DIR")"
              git clone --branch "$APP_BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin "$APP_BRANCH"
            git reset --hard "origin/$APP_BRANCH"

            cd server
            npm ci --omit=dev
            mkdir -p uploads logs

            if [ ! -f .env ]; then
              echo "Missing server/.env on deployment host. Create it from server/.env.example before deploying."
              exit 1
            fi

            set -a
            . ./.env
            set +a

            pm2 startOrReload ecosystem.config.cjs --env production --update-env
            pm2 save

            if command -v nginx >/dev/null 2>&1; then
              nginx_placeholder_conf="$(grep -Rsl 'frontend not deployed' /etc/nginx /usr/local/nginx/conf 2>/dev/null | head -n 1 || true)"
              if [ -n "$nginx_placeholder_conf" ] && [ -f "$nginx_placeholder_conf" ]; then
                cp -p "$nginx_placeholder_conf" "${nginx_placeholder_conf}.bak.$(date +%Y%m%d_%H%M%S)"
                python3 - "$nginx_placeholder_conf" <<'PY'
from pathlib import Path
import sys

path = Path(sys.argv[1])
text = path.read_text()
needle = "frontend not deployed"
hit = text.find(needle)
if hit == -1:
    raise SystemExit(0)

loc = text.rfind("location /", 0, hit)
if loc == -1:
    raise SystemExit("Could not find location / before frontend placeholder")

brace = text.find("{", loc)
if brace == -1:
    raise SystemExit("Could not find opening brace for placeholder location")

depth = 0
end = None
for i in range(brace, len(text)):
    if text[i] == "{":
        depth += 1
    elif text[i] == "}":
        depth -= 1
        if depth == 0:
            end = i + 1
            break

if end is None:
    raise SystemExit("Could not find closing brace for placeholder location")

replacement = """location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }"""

path.write_text(text[:loc] + replacement + text[end:])
PY
                nginx -t
                if command -v systemctl >/dev/null 2>&1; then
                  systemctl reload nginx || nginx -s reload
                else
                  nginx -s reload
                fi
              fi
            fi

            for attempt in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:${PORT:-3001}/health"; then
                exit 0
              fi
              echo "Waiting for backend health check... ($attempt/30)"
              sleep 2
            done

            echo "Backend health check failed after waiting."
            exit 1
