name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Recover backend if unhealthy
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: APP_DIR,SSH_HOST
          script: |
            set -euo pipefail

            APP_DIR="${APP_DIR:-/opt/yinnkhome-backend}"
            if [ "$SSH_HOST" = "47.114.87.69" ] || [ "$SSH_HOST" = "118.178.123.31" ]; then
              echo "Refusing recovery on stale or unrelated host: $SSH_HOST"
              exit 1
            fi

            case "$APP_DIR" in
              /opt/yinnkhome-backend) ;;
              /*) ;;
              *)
                echo "APP_DIR must be an absolute path, got: $APP_DIR"
                exit 1
                ;;
            esac

            case "$APP_DIR" in
              /|/var|/var/www|/var/www/*|*/server/public|*/server/public/*|*/public|*/public/*)
                echo "Refusing dangerous APP_DIR: $APP_DIR"
                exit 1
                ;;
            esac

            app_workdir() {
              if [ -f "$1/ecosystem.config.cjs" ]; then
                printf '%s\n' "$1"
              elif [ -f "$1/server/ecosystem.config.cjs" ]; then
                printf '%s\n' "$1/server"
              else
                return 1
              fi
            }

            app_port() {
              candidate_env=""
              if [ -f "$1/.env" ]; then
                candidate_env="$1/.env"
              elif [ -f "$1/server/.env" ]; then
                candidate_env="$1/server/.env"
              fi
              if [ -n "$candidate_env" ]; then
                awk -F= '/^PORT=/{print $2; exit}' "$candidate_env" | tr -d '"'\'"'"' ' || true
              fi
            }

            health_ok() {
              candidate_port="$(app_port "$APP_DIR")"
              candidate_port="${candidate_port:-3001}"
              curl -fsS "http://127.0.0.1:${candidate_port}/health" >/dev/null 2>&1
            }

            start_candidate() {
              candidate="$1"
              workdir="$(app_workdir "$candidate")" || return 1
              cd "$workdir"
              pm2 startOrReload ecosystem.config.cjs --env production --update-env
              sleep 3
              health_ok
            }

            if health_ok; then
              echo "Backend is already healthy."
              exit 0
            fi

            echo "Backend is unhealthy; trying backups."
            failed_dir="${APP_DIR}.failed.$(date +%Y%m%d_%H%M%S)"
            if [ -d "$APP_DIR" ]; then
              mv "$APP_DIR" "$failed_dir"
              echo "Moved unhealthy app to $failed_dir"
            fi

            for candidate in $(ls -dt "${APP_DIR}".backup.* 2>/dev/null || true); do
              [ -d "$candidate" ] || continue
              echo "Trying recovery candidate: $candidate"
              rm -rf "$APP_DIR"
              mv "$candidate" "$APP_DIR"
              if start_candidate "$APP_DIR"; then
                pm2 save
                echo "Recovered backend from $candidate"
                exit 0
              fi
              mv "$APP_DIR" "${candidate}.failed.$(date +%Y%m%d_%H%M%S)"
            done

            if [ -d "$failed_dir" ]; then
              mv "$failed_dir" "$APP_DIR"
            fi
            echo "Backend recovery failed; no healthy backup found."
            exit 1

      - name: Upload backend over SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          APP_DIR: ${{ secrets.APP_DIR }}
          EXPECTED_SSH_HOST: 115.29.194.46
        run: |
          set -euo pipefail

          APP_DIR="${APP_DIR:-/opt/yinnkhome-backend}"
          ssh_port="${SSH_PORT:-22}"

          if [ "$SSH_HOST" = "47.114.87.69" ] || [ "$SSH_HOST" = "118.178.123.31" ]; then
            echo "Refusing to deploy to stale or unrelated host: $SSH_HOST"
            exit 1
          fi

          if [ "$SSH_HOST" != "$EXPECTED_SSH_HOST" ]; then
            if ! getent ahosts "$SSH_HOST" | awk '{print $1}' | grep -qx "$EXPECTED_SSH_HOST"; then
              echo "SSH_HOST must be $EXPECTED_SSH_HOST or resolve to it; got $SSH_HOST"
              exit 1
            fi
          fi

          case "$APP_DIR" in
            /opt/yinnkhome-backend) ;;
            /*) ;;
            *)
              echo "APP_DIR must be an absolute path, got: $APP_DIR"
              exit 1
              ;;
          esac

          case "$APP_DIR" in
            /|/var|/var/www|/var/www/*|*/server/public|*/server/public/*|*/public|*/public/*)
              echo "Refusing dangerous APP_DIR: $APP_DIR"
              exit 1
              ;;
          esac

          if [ -d server/public ]; then
            echo "server/public exists locally but will not be uploaded."
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh_opts=(
            -i ~/.ssh/deploy_key
            -p "$ssh_port"
            -o StrictHostKeyChecking=accept-new
            -o ServerAliveInterval=15
          )

          remote="${SSH_USER}@${SSH_HOST}"
          staging_dir="${APP_DIR}.deploy-tmp"

          tar -C server -czf /tmp/yinnkhome-backend.tar.gz \
            --exclude='./.env' \
            --exclude='./node_modules' \
            --exclude='./public' \
            --exclude='./public_backup_*' \
            --exclude='./uploads' \
            --exclude='./logs' \
            --exclude='./storage' \
            app.js \
            package.json \
            package-lock.json \
            ecosystem.config.cjs \
            .env.example \
            config \
            controllers \
            middleware \
            migrations \
            routes \
            scripts \
            services \
            utils

          ssh "${ssh_opts[@]}" "$remote" "rm -rf '$staging_dir' && mkdir -p '$staging_dir'"
          ssh "${ssh_opts[@]}" "$remote" "tar -xzf - -C '$staging_dir'" < /tmp/yinnkhome-backend.tar.gz

      - name: Deploy backend over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          EXPECTED_SSH_HOST: 115.29.194.46
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: APP_DIR,SSH_HOST,EXPECTED_SSH_HOST
          script: |
            set -euo pipefail

            APP_DIR="${APP_DIR:-/opt/yinnkhome-backend}"

            if [ "$SSH_HOST" = "47.114.87.69" ] || [ "$SSH_HOST" = "118.178.123.31" ]; then
              echo "Refusing to deploy to stale or unrelated host: $SSH_HOST"
              exit 1
            fi

            case "$APP_DIR" in
              /opt/yinnkhome-backend) ;;
              /*) ;;
              *)
                echo "APP_DIR must be an absolute path, got: $APP_DIR"
                exit 1
                ;;
            esac

            case "$APP_DIR" in
              /|/var|/var/www|/var/www/*|*/server/public|*/server/public/*|*/public|*/public/*)
                echo "Refusing dangerous APP_DIR: $APP_DIR"
                exit 1
                ;;
            esac

            if ! command -v node >/dev/null 2>&1; then
              echo "Node.js is required on the server"
              exit 1
            fi

            if ! command -v npm >/dev/null 2>&1; then
              echo "npm is required on the server"
              exit 1
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            staging_dir="${APP_DIR}.deploy-tmp"
            backup_dir="${APP_DIR}.backup.$(date +%Y%m%d_%H%M%S)"
            activated="false"

            rollback() {
              exit_code=$?
              if [ "$activated" = "true" ] && [ -d "$backup_dir" ]; then
                echo "Deployment failed; rolling back to $backup_dir"
                rm -rf "$APP_DIR"
                mv "$backup_dir" "$APP_DIR"
                if [ -f "$APP_DIR/ecosystem.config.cjs" ]; then
                  cd "$APP_DIR"
                  pm2 startOrReload ecosystem.config.cjs --env production --update-env || true
                elif [ -f "$APP_DIR/server/ecosystem.config.cjs" ]; then
                  cd "$APP_DIR/server"
                  pm2 startOrReload ecosystem.config.cjs --env production --update-env || true
                fi
                pm2 save || true
              fi
              exit "$exit_code"
            }
            trap rollback ERR

            if [ ! -d "$staging_dir" ]; then
              echo "Missing uploaded staging directory: $staging_dir"
              exit 1
            fi

            if [ -d "$staging_dir/public" ] || find "$staging_dir" -maxdepth 1 -type d -name 'public_backup_*' | grep -q .; then
              echo "Refusing deploy: staging directory contains frontend static files."
              exit 1
            fi

            cd "$staging_dir"
            npm ci --omit=dev

            if [ -d "$APP_DIR" ]; then
              if [ -f "$APP_DIR/.env" ]; then
                cp -p "$APP_DIR/.env" "$staging_dir/.env"
              elif [ -f "$APP_DIR/server/.env" ]; then
                cp -p "$APP_DIR/server/.env" "$staging_dir/.env"
              fi
              for keep_dir in uploads logs storage; do
                if [ -d "$APP_DIR/$keep_dir" ]; then
                  rm -rf "$staging_dir/$keep_dir"
                  cp -a "$APP_DIR/$keep_dir" "$staging_dir/$keep_dir"
                elif [ -d "$APP_DIR/server/$keep_dir" ]; then
                  rm -rf "$staging_dir/$keep_dir"
                  cp -a "$APP_DIR/server/$keep_dir" "$staging_dir/$keep_dir"
                fi
              done
              mv "$APP_DIR" "$backup_dir"
            fi

            mkdir -p "$(dirname "$APP_DIR")"
            mv "$staging_dir" "$APP_DIR"
            activated="true"
            cd "$APP_DIR"

            mkdir -p uploads logs storage

            if [ ! -f .env ]; then
              echo "Missing .env on deployment host. Create it from .env.example before deploying."
              exit 1
            fi

            set -a
            . ./.env
            set +a

            node scripts/run-migration.js migrations/20260628_owner_member_role.sql
            node scripts/run-migration.js migrations/20260628_project_event_notifications.sql
            node scripts/run-migration.js migrations/20260628_project_lifecycle_status.sql
            node scripts/run-migration.js migrations/20260629_business_catalog_companies.sql
            node scripts/run-migration.js migrations/20260629_professionals.sql
            node scripts/run-migration.js migrations/20260629_company_members.sql
            node scripts/run-migration.js migrations/20260629_consultation_targets.sql
            node scripts/run-migration.js migrations/20260629_project_participants_ext.sql
            node scripts/run-migration.js migrations/20260629_entity_relations.sql
            node scripts/run-migration.js migrations/20260629_company_boundary_fields.sql
            node scripts/run-migration.js migrations/20260630_merchant_product_showcase.sql
            node scripts/run-migration.js migrations/20260630_merchant_profile_offline_fields.sql

            pm2 startOrReload ecosystem.config.cjs --env production --update-env
            pm2 save

            for attempt in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:${PORT:-3001}/health"; then
                exit 0
              fi
              echo "Waiting for backend health check... ($attempt/30)"
              sleep 2
            done

            echo "Backend health check failed after waiting."
            exit 1
