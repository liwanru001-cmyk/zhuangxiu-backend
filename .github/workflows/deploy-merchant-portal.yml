name: Deploy Merchant Portal

on:
  push:
    branches:
      - main
    paths:
      - 'server/public/merchant/**'
      - '.github/workflows/deploy-merchant-portal.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate merchant portal artifact
        run: |
          set -euo pipefail
          test -f server/public/merchant/index.html
          test ! -f server/public/index.html.tmp

      - name: Upload merchant portal over SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          MERCHANT_PUBLIC_DIR: ${{ secrets.MERCHANT_PUBLIC_DIR }}
          EXPECTED_SSH_HOST: 115.29.194.46
        run: |
          set -euo pipefail

          ssh_port="${SSH_PORT:-22}"

          MERCHANT_PUBLIC_DIR="/opt/yinnkhome-backend/server/public"

          if [ "$SSH_HOST" = "47.114.87.69" ] || [ "$SSH_HOST" = "118.178.123.31" ]; then
            echo "Refusing to deploy to stale or unrelated host: $SSH_HOST"
            exit 1
          fi

          if [ "$SSH_HOST" != "$EXPECTED_SSH_HOST" ]; then
            if ! getent ahosts "$SSH_HOST" | awk '{print $1}' | grep -qx "$EXPECTED_SSH_HOST"; then
              echo "SSH_HOST must be $EXPECTED_SSH_HOST or resolve to it; got $SSH_HOST"
              exit 1
            fi
          fi

          case "$MERCHANT_PUBLIC_DIR" in
            /*) ;;
            *)
              echo "MERCHANT_PUBLIC_DIR must be an absolute path, got: $MERCHANT_PUBLIC_DIR"
              exit 1
              ;;
          esac

          case "$MERCHANT_PUBLIC_DIR" in
            /opt/yinnkhome-backend/server/public) ;;
            *)
              echo "Refusing dangerous MERCHANT_PUBLIC_DIR: $MERCHANT_PUBLIC_DIR"
              exit 1
              ;;
          esac

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh_opts=(
            -i ~/.ssh/deploy_key
            -p "$ssh_port"
            -o StrictHostKeyChecking=accept-new
            -o ServerAliveInterval=15
          )
          scp_opts=(
            -i ~/.ssh/deploy_key
            -P "$ssh_port"
            -o StrictHostKeyChecking=accept-new
            -o ServerAliveInterval=15
          )

          remote="${SSH_USER}@${SSH_HOST}"
          remote_tmp="/tmp/yinnkhome-merchant-index-${GITHUB_RUN_ID}.html"

          scp "${scp_opts[@]}" server/public/merchant/index.html "$remote:$remote_tmp"
          ssh "${ssh_opts[@]}" "$remote" \
            "set -euo pipefail
             runner=''
             if [ \"\$(id -u)\" -ne 0 ]; then
               if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
                 runner='sudo'
               else
                 echo 'Deployment user needs root or passwordless sudo to write merchant portal.'
                 exit 1
               fi
             fi
             \$runner mkdir -p '$MERCHANT_PUBLIC_DIR/merchant'
             cp '$remote_tmp' /tmp/yinnkhome-merchant-index-ready.html
             \$runner cp /tmp/yinnkhome-merchant-index-ready.html '$MERCHANT_PUBLIC_DIR/merchant/index.html.tmp'
             \$runner mv '$MERCHANT_PUBLIC_DIR/merchant/index.html.tmp' '$MERCHANT_PUBLIC_DIR/merchant/index.html'
             rm -f '$remote_tmp'
             rm -f /tmp/yinnkhome-merchant-index-ready.html
             test -f '$MERCHANT_PUBLIC_DIR/merchant/index.html'"

      - name: Verify merchant portal URL
        run: |
          set -euo pipefail
          tmp_file="$(mktemp)"
          curl -fsS https://yinnkhome.com/merchant/ -o "$tmp_file"
          grep -q '商家入口 - 装修不凡' "$tmp_file"
